<div class="dlg task-popup-dlg">
    <button class="dlg-close-btn" type="button" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <line x1="6" y1="6" x2="18" y2="18"></line>
            <line x1="18" y1="6" x2="6" y2="18"></line>
        </svg>
    </button>

    <div class="dlg-header">
        <div class="name">Student Name</div>
        <div class="desc hover">
            <span class="title-text">Task Title</span>
            <svg class="desc-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
    </div>

    <div class="slider-card">
        <div class="slider-panels">
            
            <div class="slider-panel request-message active">
                <div class="date dlg-date">May 12, 2025</div>
                <div class="message">Could you please help me understand the second part of this assignment? I've been stuck on it since yesterday.</div>
                <div class="attachments">
                    <div class="attachment-title">Attachments (1)</div>
                    <div class="attachment-item">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
                        <span>assignment_details.pdf</span>
                    </div>
                </div>
            </div>

            
            <div class="slider-panel updates">
                <div class="updates-list">
                    <div class="update-item">
                        <div class="date">May 13, 2025</div>
                        <div class="message">I've attached the solution for the first part. Let me know if you need more details.</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="slider-footer">
            <div class="nav-group">
                <div class="nav-btn prev disabled">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </div>
                <div class="slider-dots">
                    <span class="s-dot active"></span>
                    <span class="s-dot"></span>
                </div>
                <div class="nav-btn next">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="popper"></div>
